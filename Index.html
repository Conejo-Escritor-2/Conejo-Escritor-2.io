<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carta de Rosas</title>
  <style>
    body {
      background-color: #FFF8DC; /* Amarillo pastel */
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      text-align: center;
    }

    .rosa {
      position: absolute;
      width: 70px;
      height: 70px;
      cursor: pointer;
      animation: caer 6s linear forwards;
      background-size: cover;
      background-repeat: no-repeat;
    }

    @keyframes caer {
      0% { top: -70px; opacity: 1; }
      100% { top: 100vh; opacity: 0.7; }
    }

    #mensaje {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: bold;
      color: #B22222;
      background: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    #continuar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      font-size: 18px;
      background-color: #B22222;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }

    #continuar:hover {
      background-color: #8B0000;
    }
  </style>
</head>
<body>
  <h1 style="margin-top:20px; color:#B22222;">🌹 Para Mi Amor 🌹</h1>
  <div id="mensaje"></div>
  <button id="continuar">Continuar</button>

  <script>
    const mensajes = [
      "Me encantan tus ojos",
      "Me gustan tus sentimientos",
      "Tu sonrisa ilumina mi día",
      "Eres mi inspiración",
      "Me haces feliz",
      "Tu voz me calma",
      "Tu ternura me conquista",
      "Eres mi mejor amiga",
      "Me encanta tu alegría",
      "Tu mirada me hipnotiza",
      "Eres mi paz",
      "Me gusta tu forma de pensar",
      "Tu bondad me inspira",
      "Eres mi razón de sonreír",
      "Me encanta tu energía",
      "Tu amor me fortalece",
      "Eres mi sueño hecho realidad",
      "Me gusta tu sinceridad",
      "Tu abrazo me protege",
      "Eres mi destino",
      "Me encanta tu dulzura",
      "Tu presencia me llena",
      "Eres mi todo",
      "Me gusta tu forma de amar",
      "Tu existencia me completa"
    ];

    let contador = 0;

    function crearRosa() {
      if (contador >= 25) return; // máximo 25 rosas
      contador++;
      const rosa = document.createElement("div");
      rosa.classList.add("rosa");
      // ahora entre 30% y 70% del ancho de la pantalla
      const anchoPantalla = window.innerWidth;
      const posicion = (anchoPantalla * 0.3) + Math.random() * (anchoPantalla * 0.4);
      rosa.style.left = posicion + "px";
      rosa.style.backgroundImage = "url('rosa.png')"; // tu imagen de rosa
      rosa.dataset.id = contador;
      document.body.appendChild(rosa);

      rosa.addEventListener("click", () => mostrarMensaje(contador, rosa));
    }

    function mostrarMensaje(id, rosa) {
      const mensaje = document.getElementById("mensaje");
      mensaje.innerText = `Rosa #${id}: ${mensajes[id-1]}`;
      document.getElementById("continuar").style.display = "block";
      rosa.remove(); // quitar la rosa clickeada
    }

    document.getElementById("continuar").addEventListener("click", () => {
      document.getElementById("mensaje").innerText = "";
      document.getElementById("continuar").style.display = "none";
    });

    // Generar lluvia continua de rosas (más lenta: cada 1.5 segundos)
    setInterval(crearRosa, 1500);
  </script>
</body>
</html>
